name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev libasound2-dev libssl-dev libgtk-layer-shell-dev libx11-dev libxtst-dev libxi-dev libxrandr-dev libxkbcommon-dev libdbus-1-dev pkg-config cmake
      - name: Install frontend dependencies
        run: bun install --frozen-lockfile
      - name: Build frontend
        run: bun run build
      - name: Check Rust backend
        run: cd src-tauri && cargo check
